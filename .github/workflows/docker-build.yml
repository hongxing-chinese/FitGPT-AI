name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签版本 (例如: v1.0.0)'
        required: true
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            ADMIN_USER_IDS=${{ secrets.ADMIN_USER_IDS }}
            AGGREGATE_LOGIN_APPID=${{ secrets.AGGREGATE_LOGIN_APPID }}
            AGGREGATE_LOGIN_APPKEY=${{ secrets.AGGREGATE_LOGIN_APPKEY }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            DB_PROVIDER=${{ secrets.DB_PROVIDER }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            DEFAULT_OPENAI_BASE_URL=${{ secrets.DEFAULT_OPENAI_BASE_URL }}
            DEFAULT_OPENAI_API_KEY=${{ secrets.DEFAULT_OPENAI_API_KEY }}
            KEY_ENCRYPTION_SECRE=${{ secrets.KEY_ENCRYPTION_SECRE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.build-push.outputs.digest }}
